<!DOCTYPE html>
<html>
<body>
<p>Click on the 16 map zones in order (p1 to p16) to generate exact coordinates:</p>
<img id="map" src="https://files.catbox.moe/1ipgnj.png" style="max-width:1024px; border:1px solid black; cursor:crosshair;" />
<pre id="output"></pre>
<script>
let count = 1;
document.getElementById('map').addEventListener('click', (e) => {
    const rect = e.target.getBoundingClientRect();
    const x = Math.round((e.clientX - rect.left) * (1024 / rect.width));
    const y = Math.round((e.clientY - rect.top) * (1024 / rect.height));
    document.getElementById('output').innerText += `p${count}: { x: ${x}, y: ${y} },\n`;
    count++;
});
</script>
</body>
</html>
